<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cuộc thi Tìm hiểu Pháp luật xã Gia Kiệm 2026</title>
<style>
   body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    margin: 0; 
    background-image: url("https://lh3.googleusercontent.com/u/0/d/1EaZMcge5H7k9riprfIsAc8Eb2yPed-cI"); 
    background-attachment: fixed; 
    background-repeat: no-repeat; 
    background-size: cover; 
    background-position: center;
    display: flex; 
    justify-content: center; 
    min-height: 100vh;
}
  .main { 
    width: 100%; 
    max-width: 950px; 
    padding: 25px; 
    background: rgba(255, 255, 255, 0.96); 
    min-height: 100vh; 
    box-shadow: 0 0 30px rgba(0,0,0,0.2); 
    position: relative;
    display: flex;
    flex-direction: column;
  }
  
  .quiz-container { display: flex; gap: 20px; }
  .questions-section { flex: 3; }
  .navigation-section { 
    flex: 1; 
    position: sticky; 
    top: 20px; 
    height: fit-content;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    text-align: center;
  }

  #info-screen { text-align: center; padding: 20px; }
  .input-group { 
    text-align: left; max-width: 500px; margin: 0 auto; 
    background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #dee2e6;
  }
  input { 
    width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ced4da; border-radius: 6px; font-size: 16px; box-sizing: border-box;
  }
  
  .timer { 
    background: #d9534f; color: white; font-size: 24px; font-weight: bold; 
    text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 20px;
  }

  .question-card { 
    margin-bottom: 25px; padding: 20px; background: #fff; border-radius: 8px;
    border-left: 5px solid #007bff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .answer-option {
    display: flex; align-items: center; padding: 12px; cursor: pointer;
    border: 1px solid #eee; margin-bottom: 8px; border-radius: 6px; text-align: left;
  }
  .answer-option:hover { background: #f0f7ff; }
  .answer-option input { margin-right: 12px; width: 20px; height: 20px; cursor: pointer; }

  .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
  .nav-item { 
    padding: 10px 5px; background: #eee; border: 1px solid #ccc; 
    border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold;
  }
  .nav-item.active { background: #28a745; color: white; border-color: #1e7e34; }

  #submit-btn { 
    background: #28a745; color: white; border: none; padding: 18px; 
    font-size: 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; 
  }
  
  @media (max-width: 768px) {
    .quiz-container { flex-direction: column; }
    .navigation-section { position: static; order: -1; }

/* Style riêng cho khu vực QR */
  .qr-section { margin-top: 30px; padding: 20px; border-top: 1px solid #eee; background-color: #fafafa; border-radius: 8px; }
  .qr-code-img { max-width: 150px; height: auto; border: 1px solid #ccc; padding: 5px; background: white; margin-top: 10px; }

  }
</style>
</head>
<body>

<div class="main">
  <div style="text-align: center; margin-bottom: 20px;">
   <img src="https://lh3.googleusercontent.com/u/0/d/1mPbec-OotP3CjpZ0r_KKnSjSAD4kSCb-" alt="Banner Gia Kiệm" style="width:100%;">
  </div>

  <div id="info-screen">
    <div class="input-group">
      <h2 style="color: #0056b3; text-align: center;">THÔNG TIN THÍ SINH</h2>
      
      <label><b>Họ và tên (*):</b></label>
      <input id="name" type="text" placeholder="Nguyễn Văn A">
      
      <label><b>Ngày, tháng, năm sinh (*):</b></label>
      <input id="birth" type="text" placeholder="dd/mm/yyyy">
      
      <label><b>Đơn vị công tác/Địa chỉ (*):</b></label>
      <input id="address" type="text" placeholder="Ấp/Xã hoặc Cơ quan...">
      
      <label><b>Số CCCD hoặc Số định danh (*):</b></label>
      <input id="cccd" type="text" placeholder="Số thẻ căn cước...">
      
      <label><b>Số điện thoại (*):</b></label>
      <input id="phone" type="text" placeholder="090xxxxxxx">
      
      <button class="btn-start" style="width:100%; padding:15px; background:#007bff; color:white; border:none; border-radius:30px; font-weight:bold; cursor:pointer;" onclick="startQuiz()">BẮT ĐẦU THI</button>
    </div>
  </div>
<div class="qr-section">
      <p style="margin: 0; color: #555; font-weight: bold;">Quét mã QR để biết thêm về quy định thi và giải thưởng</p>
      <p style="margin: 5px 0; color: #777; font-size: 14px;">(Hoặc để lấy tài liệu tham khảo)</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://zalo.me/g/your_group_id" 
           alt="Mã QR Nhóm Zalo" 
           class="qr-code-img">
    </div>


  <div id="quiz-screen" style="display:none;">
    <div class="timer" id="timer">15:00</div>
    <div class="quiz-container">
      <div class="questions-section" id="quiz-content"></div>
      <div class="navigation-section">
        <b style="color:#0056b3;">TIẾN ĐỘ</b>
        <div class="nav-grid" id="nav-grid"></div>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <img src="https://via.placeholder.com/150?text=QR+Zalo" alt="QR Code" style="width:100px; margin-bottom: 10px;">
        <p style="font-size: 11px; color: #666;">Quét mã để được hỗ trợ</p>
      </div>
    </div>
    <button id="submit-btn" onclick="submitQuiz()" style="margin-top:30px;">NỘP BÀI THI</button>
  </div>
</div>

<script>
// ĐƯỜNG DẪN WEB APP CỦA BẠN (Đã sửa đúng link từ file cũ)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkyTF5XLcTXoPEAyQtEa-cTsrwwfjXTd3z6PFkJ0GgjM1NBCOJIDNSbmphfiBKOy3t/exec";

const questionsBank = [
  {q:"Nguyễn Ái Quốc gửi bản “Yêu sách của nhân dân An Nam” vào năm nào?", a:["1917","1919","1918","1920"], correct:1},
  {q:"Nguyễn Tất Thành ra đi tìm đường cứu nước ngày nào?", a:["5/6/1911","2/6/1911","19/5/1890","4/6/1911"], correct:0},
  {q:"Cách mạng giải phóng dân tộc phải theo con đường nào?", a:["Tư sản","Vô sản","XHCN","Ruộng đất"], correct:1},
  {q:"Ưu điểm lớn nhất của Khổng Tử theo HCM là gì?", a:["Hiếu học","Quản lý đạo đức","Tu dưỡng cá nhân","Tự do"], correct:2},
  {q:"Sức mạnh dân tộc theo tư tưởng HCM bao gồm?", a:["Yêu nước","Tự lực","Đoàn kết","Cả 3 yếu tố trên"], correct:3},
  {q:"Mục tiêu cao nhất của Chủ nghĩa xã hội là gì?", a:["Phát triển kinh tế","Nâng cao đời sống dân","Khoa học","Chính trị"], correct:1},
  {q:"Đại đoàn kết dân tộc được xác định là?", a:["Kế sách tạm thời","Chiến lược lâu dài","Phương pháp đối phó","Nhiệm vụ phụ"], correct:1},
  {q:"Đảng Cộng sản Việt Nam là Đảng của?", a:["Giai cấp công nhân","Nhân dân lao động","Toàn dân tộc","Cả 3 phương án"], correct:3},
  {q:"Nhà nước của dân là nhà nước?", a:["Do dân bầu ra","Dân làm chủ","Phục vụ lợi ích của dân","Cả 3 đúng"], correct:3},
  {q:"“Một dân tộc dốt là một dân tộc...”?", a:["Lạc hậu","Yêu","Kém phát triển","Bị cô lập"], correct:1}
 {q:"Nguyễn Ái Quốc gửi bản “Yêu sách của nhân dân An Nam” vào năm nào?", a:["1917","1919","1918","1920"], correct:1},
  {q:"Nguyễn Tất Thành ra đi tìm đường cứu nước ngày nào?", a:["5/6/1911","2/6/1911","19/5/1890","4/6/1911"], correct:0},
  {q:"Cách mạng thuộc địa thắng trước vì?", a:["Địch yếu","Lực lượng mạnh","Dân tộc mạnh","Thuộc địa là trung tâm"], correct:3},
  {q:"Cách mạng bạo lực là?", a:["Vũ trang","Chính trị","Ngoại giao","Kết hợp"], correct:3},
  {q:"Vận dụng tư tưởng dân tộc cần?", a:["Yêu nước","Quan điểm CN","Đoàn kết","Cả 3"], correct:3},
  {q:"Mục tiêu CNXH?", a:["Kinh tế","Đời sống","Khoa học","Phát triển"], correct:1},
  {q:"Động lực CNXH?", a:["Khoa học","Con người","Chính trị","Quốc tế"], correct:1},
  {q:"Việt Nam đi lên CNXH?", a:["Lược qua","Băng qua","Bỏ qua TBCN","Xuyên qua"], correct:2},
  {q:"Nguyên nhân thất bại cuối XIX?", a:["Không đoàn kết","Lãnh đạo phong kiến","Sai đường","Cả 3"], correct:3},
  {q:"Đại đoàn kết là?", a:["Kế sách","Chiến lược","Phương pháp","Then chốt"], correct:1},
  {q:"Lực lượng chính đoàn kết?", a:["CN","CN ND","Học trò","CN ND trí thức"], correct:1},
  {q:"Đảng trong mặt trận?", a:["Thành viên","Lãnh đạo","Cả 2","Cả 3"], correct:2},
  {q:"Tổ chức mặt trận là?", a:["Đảng phái","Nhân dân","Giai cấp","Mọi tổ chức"], correct:3},
  {q:"Ngoại giao cần?", a:["Tự lực","Độc lập","Ngoại sinh","Tất cả"], correct:0},
  {q:"Nguyên tắc ngoại giao?", a:["Cứng","Mềm","Cả 2","Dĩ bất biến"], correct:2},
  {q:"“Cách mệnh trước hết…” ở tác phẩm nào?", a:["Bản án","Đường Cách mệnh","Chánh cương","Chính trị"], correct:1},
  {q:"Đảng là của ai?", a:["Công nhân","Nhân dân","Cả 2","Toàn dân"], correct:3},
  {q:"Nguyên tắc xây dựng Đảng?", a:["Tập trung","Phê bình","Đoàn kết","Cả 3"], correct:3},
  {q:"Đảng phải đổi mới?", a:["Chính trị","Tổ chức","Tư tưởng","Cả 3"], correct:3},
  {q:"Nhà nước của dân?", a:["Do dân","Dân là chủ","Phục vụ dân","Cả 3"], correct:3}

];

let shuffled, startTime, countdown;
let timeLeft = 15 * 60;

// Chống thi lại bằng trình duyệt (Dự phòng)
if(localStorage.getItem("done")){
  document.body.innerHTML = "<div style='text-align:center; padding-top:100px; font-family:sans-serif;'><h1>BẠN ĐÃ NỘP BÀI THÀNH CÔNG!</h1><p>Hệ thống đã ghi nhận kết quả của bạn.</p></div>";
}

function startQuiz() {
  const name = document.getElementById("name").value.trim();
  const birth = document.getElementById("birth").value.trim();
  const address = document.getElementById("address").value.trim();
  const cccd = document.getElementById("cccd").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if(!name || !birth || !address || !cccd || !phone) {
    return alert("Vui lòng điền đầy đủ các thông tin có dấu (*)");
  }

  const btn = document.querySelector(".btn-start");
  btn.innerText = "ĐANG KIỂM TRA HỆ THỐNG...";
  btn.disabled = true;

  // Tạo một tên hàm tạm thời để nhận dữ liệu trả về
  const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
  
  window[callbackName] = function(data) {
    // Xóa dấu vết sau khi kiểm tra xong
    delete window[callbackName];
    const oldScript = document.getElementById('jsonpScript');
    if (oldScript) oldScript.remove();

    if (data.status === "exists") {
      alert("Số CCCD này đã tham gia thi trước đó. Mỗi thí sinh chỉ được thi 01 lần!");
      btn.innerText = "BẮT ĐẦU THI";
      btn.disabled = false;
    } else {
      // Cho phép vào thi
      document.getElementById("info-screen").style.display = "none";
      document.getElementById("quiz-screen").style.display = "block";
      renderQuiz();
      startTime = Date.now();
      countdown = setInterval(updateTimer, 1000);
    }
  };

  // Gửi yêu cầu kiểm tra bằng cách chèn thẻ <script>
  const script = document.createElement('script');
  script.id = 'jsonpScript';
  script.src = `${SCRIPT_URL}?action=checkCCCD&cccd=${encodeURIComponent(cccd)}&callback=${callbackName}`;
  script.onerror = function() {
    alert("Lỗi kết nối máy chủ. Hãy kiểm tra lại SCRIPT_URL hoặc kết nối mạng!");
    btn.innerText = "BẮT ĐẦU THI";
    btn.disabled = false;
  };
  document.body.appendChild(script);
}function updateTimer() {
  let m = Math.floor(timeLeft/60), s = timeLeft%60;
  document.getElementById("timer").innerText = `${m}:${s<10?'0':''}${s}`;
  if(timeLeft <= 0) { 
    clearInterval(countdown); 
    submitQuiz(); 
  }
  timeLeft--;
}

function renderQuiz() {
  const content = document.getElementById("quiz-content");
  const nav = document.getElementById("nav-grid");
  content.innerHTML = ""; nav.innerHTML = "";
  shuffled = [...questionsBank].sort(() => Math.random() - 0.5);

  shuffled.forEach((q, i) => {
    let card = document.createElement("div");
    card.className = "question-card";
    card.id = "question-box-" + i;
    let html = `<b>Câu ${i+1}: ${q.q}</b><br><br>`;
    q.a.forEach(ans => {
      const isRight = (ans === q.a[q.correct]);
      html += `<label class="answer-option">
                <input type="radio" name="q${i}" value="${isRight}" onchange="updateNav(${i})">
                <span>${ans}</span>
              </label>`;
    });
    card.innerHTML = html;
    content.appendChild(card);

    let navBtn = document.createElement("div");
    navBtn.className = "nav-item";
    navBtn.id = "nav-item-" + i;
    navBtn.innerText = i + 1;
    navBtn.onclick = () => document.getElementById("question-box-"+i).scrollIntoView({behavior: 'smooth'});
    nav.appendChild(navBtn);
  });
}

function updateNav(index) {
  document.getElementById("nav-item-" + index).classList.add("active");
}

function submitQuiz() {
  clearInterval(countdown);
  let correctCount = 0;
  shuffled.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if(selected && selected.value === "true") correctCount++;
  });

  const totalQ = shuffled.length;
  const percent = ((correctCount / totalQ) * 100).toFixed(2);
  const timeUsed = Math.floor((Date.now() - startTime) / 1000);

  const data = {
    name: document.getElementById("name").value,
    birth: document.getElementById("birth").value,
    address: document.getElementById("address").value,
    cccd: document.getElementById("cccd").value,
    phone: document.getElementById("phone").value,
    score: `${correctCount}/${totalQ}`,
    percentage: percent + "%",
    time: timeUsed + " giây"
  };

  alert(`Nộp bài thành công! Kết quả: ${data.score} (${data.percentage})`);

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  }).then(() => {
    localStorage.setItem("done", "true");
    location.reload();
  });
}
</script>
</body>
</html>
